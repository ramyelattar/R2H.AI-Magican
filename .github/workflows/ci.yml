name: CI

on:
  pull_request:
  push:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-quality-security:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify architecture and quality gates
        run: |
          ./gradlew --no-daemon qualityGate detekt ktlintCheck

      - name: Build and static analysis
        run: |
          ./gradlew --no-daemon assembleDebug test lintDebug :app:checkDebugDuplicateClasses

      - name: Generate SBOM
        run: |
          ./gradlew --no-daemon cyclonedxBom

      - name: Dependency vulnerability scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./gradlew --no-daemon dependencyCheckAnalyze

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            **/build/reports/bom/**
            **/build/reports/dependency-check-report.*
