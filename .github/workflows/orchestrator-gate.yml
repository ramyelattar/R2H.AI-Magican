name: Orchestrator Gate

on:
  pull_request:
    paths:
      - "ai/orchestrator/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/**"
  push:
    branches:
      - main
      - master
    paths:
      - "ai/orchestrator/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orchestrator-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator-gate:
    name: Orchestrator Gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Run orchestrator gate task (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew --no-daemon orchestratorGate

      - name: Run orchestrator gate task (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat --no-daemon orchestratorGate
